<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遇見 - 孫燕姿專輯人格測試</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-base: #fcfaf8;
            --accent: #d35400;
            --text-main: #34495e;
            --text-sub: #a0a0a0;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        #welcome-ui { 
            text-align: center; 
            padding: 60px 25px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            animation: welcomeFadeIn 1.2s ease; 
        }
        .welcome-title { 
            font-size: 3rem; 
            font-weight: 200; 
            color: var(--accent); 
            margin-bottom: 10px; 
            letter-spacing: 12px;
        }
        .welcome-sub { 
            font-size: 0.9rem; 
            color: var(--text-sub); 
            margin-bottom: 60px; 
            letter-spacing: 4px; 
        }
        .btn-start-quiz { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 18px 60px; 
            border-radius: 40px; 
            font-size: 1rem; 
            letter-spacing: 4px;
            cursor: pointer; 
            transition: 0.4s; 
            box-shadow: 0 8px 25px rgba(211, 84, 0, 0.2); 
        }
        .btn-start-quiz:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(211, 84, 0, 0.3); }

        /* 在 CSS 最後補上這個動畫定義 */
        @keyframes welcomeFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }


        #quiz-ui { display: none; }
        .progress-container { width: 100%; height: 2px; background: #eee; margin-bottom: 40px; overflow: hidden; border-radius: 2px; }
        #progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.4s ease; }
        .step-info { font-size: 0.75rem; letter-spacing: 0.1em; color: var(--text-sub); margin-bottom: 8px; }
        .q-text { font-size: 1.25rem; font-weight: 400; line-height: 1.6; margin-bottom: 35px; min-height: 4.5rem; color: #2c3e50; }
        .options-group { display: flex; flex-direction: column; gap: 12px; }
        .opt { border: none; background: var(--card-bg); padding: 18px; border-radius: 12px; text-align: left; font-size: 0.95rem; color: var(--text-main); cursor: pointer; transition: all 0.2s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid transparent; }
        .opt:hover { border-color: var(--accent); color: var(--accent); background: #fffcf9; }

        .btn-prev { background: none; border: none; color: var(--text-sub); font-size: 0.85rem; margin-top: 25px; cursor: pointer; text-decoration: underline; opacity: 0.7; width: 100%; }
        .btn-prev:hover { opacity: 1; color: var(--accent); }

        #result { display: none; text-align: center; animation: fadeIn 1s ease forwards; }
        .album-name { font-size: 2.2rem; font-weight: 700; margin-bottom: 20px; color: var(--accent); }
        .desc-text { font-size: 0.9rem; line-height: 1.8; color: #7f8c8d; margin: 25px 0; text-align: justify; padding: 0 5px; }
        #radar-container { margin: 20px auto; width: 100%; max-width: 320px; }
        .btn-restart { margin-top: 40px; background: transparent; border: 1px solid #ddd; padding: 12px 30px; border-radius: 25px; color: var(--text-sub); cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
        /* 防止滑動時出現滾動條 */
        body {
            overflow-x: hidden;
        }

        /* 題目從右側滑入動畫 */
        .slide-in-right {
            animation: slideInRight 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px); /* 從右側 30px 開始 */
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 如果點擊「返回」按鈕，可以選用這個從左側滑入的效果（選配） */
        .slide-in-left {
            animation: slideInLeft 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }


    </style>
</head>
<body>

<div id="app">
        <div id="welcome-ui">
        <div style="font-size: 2rem; margin-bottom: 20px; opacity: 0.3;">♪</div>
        <div class="welcome-title">遇見</div>
        <div class="welcome-sub">孫燕姿專輯人格感應</div>
        <button class="btn-start-quiz" onclick="startQuiz()">開始感應</button>
        <div style="margin-top: 60px; font-size: 0.7rem; color: #ccc; letter-spacing: 2px;">
            此測試非專業測試，僅供娛樂參考，不上升任何現實人格與價值問題
        </div>
    </div>


    <div id="quiz-ui">
        <div class="progress-container"><div id="progress-fill"></div></div>
        <div class="step-info" id="step-tag"></div>
        <div class="q-text" id="q-text"></div>
        <div class="options-group" id="opt-box"></div>
        <button id="prev-btn" class="btn-prev" onclick="prevQuestion()" style="display:none;">← 返回上一題</button>
    </div>

    <div id="result">
        <span style="font-size: 0.75rem; color: #a0a0a0; letter-spacing: 2px;">SOUL ALBUM MATCH</span>
        <div class="album-name" id="res-title"></div>
        <div id="radar-container"><canvas id="radarChart"></canvas></div>
        <div class="desc-text" id="res-desc"></div>
        
        <div style="margin-top: 30px; text-align: left; padding: 0 10px;">
            <h3 style="font-size: 0.95rem; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 10px; margin-bottom: 12px;">潛意識剖析</h3>
            <p id="res-subconscious" style="font-size: 0.85rem; line-height: 1.6; color: #7f8c8d;"></p>
        </div>

        <button class="btn-restart" onclick="location.reload()">重新感應</button>
    </div>
</div>

<script>
    const questions = [
        {
            text: "1. 「天黑黑，欲落雨」，當我感到迷茫或受挫時，我會想回到家人的懷抱中尋求安慰。",

                { text: "符合", v: [10, 0, 0, 10, 0, 0, 0, 5] }, // 感性、懷舊
                { text: "中立", v: [0, 0, 0, 0, 0, 0, 0, 0] },
                { text: "不符合", v: [0, 10, 0, -5, 5, 0, 0, 0] } // 偏向獨立、勇氣
            ]
        },
        {
            text: "2. 「愛情是循序漸進的過程」，我在處理情感時非常謹慎，會觀察許多細小的細節。",
            options: [
                { text: "符合", v: [5, 0, 0, 0, 0, 0, 5, 10] }, // 細膩、深刻
                { text: "中立", v: [0, 0, 0, 0, 0, 0, 0, 0] },
                { text: "不符合", v: [0, 0, 10, 0, 0, 10, 0, -10] } // 偏向活力、自由
            ]

        {
            text: "3. 「我要的幸福，在不遠處」，我對未來有清晰的目標，並願意為之獨自努力。",

                { text: "中立", v: [0, 0, 0, 0, 0, 0, 0, 0] },

                { text: "不符合", v: [0, 10, 0, 0, 0, -10, 5, 5] } // 偏向獨立、深刻

        {

                { text: "不符合", v: [0, 5, 0, 5, 0, -10, 0, 10] }

                { text: "符合", v: [0, 0, 10, 0, 5, 5, 0, 0] }, // 活力、勇氣

                { text: "不符合", v: [0, 0, -10, 10, 0, 0, 5, 0] }

        {
            text: "9. 「有一束光，那瞬間，是什麼痛得刺眼」，我容易覺察到環境中細微的氛圍變化。",

            options: [

                { text: "中立", v: [0, 0, 0, 0, 0, 0, 0, 0] },
                { text: "不符合", v: [0, 5, 5, 0, 0, -5, -10, 5] } // 偏向保守、中庸

            "《風箏》": {
                subconscious: `你的內在核心由「${topTrait}」驅動。在潛意識的荒原中，你是一個追求「極致自由」的自由主義者。榮格的原型理論認為，你內心深處隱藏著「浪遊者」的原型。你潛意識中的「風箏」意象，實則是對社會化束縛的一種深層心理投射：你渴望被鏈接，但拒絕被占有。這種特質揭示了你對「心理空間」的高度敏感，你傾向於在變動的世界中尋找流動性的意義，而非定居式的安定。這種潛意識裡的靈動與詩意，讓你具備了極強的藝術直覺，使你能在繁雜的現實數據中捕捉到那一抹轉瞬即逝的「綠光」，並將其轉化為支撐生命的奇跡感，這讓你人格中始終保留著一份不可馴服的野性與純真。`,
                depth: `在社會學視角下，《風箏》是你對「科層制社會」的一種詩意反抗。社會學家韋伯曾討論過理性的「鋼鐵之籠」，而你正是那個試圖破籠而出的風箏。這張專輯反映了你在當代複雜人際網絡中，試圖重塑「主體性自由」的努力。你與《逃亡》中決絕勇氣的契合，本質上是你對社會規範中「一致性」的優雅拒絕。社會心理學中的「選擇理論」在你的選擇中表現明顯：自由對你而言，是比安定更重要的生命基石。它記錄了你作為一個靈魂的行者，如何在一個崇尚安全感的時代裡，依然向往廣袤無垠的天空，這種俯瞰世界的視角讓你散發出一種獨特的魅力，在群體中保持著一種「疏離的參與感」。`,
                philosophy: `哲學上，這張專輯觸及了薩特（Jean-Paul Sartre）關於「自由是個體的重擔」的命題。在你的哲學裡，孤獨不是被動的遺棄，而是主動的選擇。你寧願承擔斷線後墜落的虛無風險，也不願被拴在平庸的地面，這是一種對「主體性自由」的終極崇拜。專輯中的《綠光》象徵著一種魔幻現實主義的希望，它並非確定的結果，而是一種不斷追尋的過程。你的哲學觀是「流動」的，你認為存在即是不斷地出發、不斷地與過去切割，在動態的流浪中尋找生命的坐標。這種哲學厚度讓你具備了一種瀟灑的生命底色，在面對命運的束縛時，總能以一種輕盈的姿態完成突圍。`,
                artistic: `文學意象上，這是一部契合凱魯亞克式（Jack Kerouac）「在路上（On the Road）」美學的作品。音樂中充滿了速度感與流動性，意象橫跨了《任性》的私人敘事與《逃亡》的公路電影質感。它展現了一種「有根的流浪」美學——既有對過往的眷戀，又有對遠方的決絕。這張專輯的文學性在於它的「風感」，每一首歌都像是一陣吹過荒野的風，帶有強烈的色彩感與空氣感。這種審美取向揭示了你對「靈動美」的熱愛，你傾向於在那種多變、跳躍且充滿想像空間的藝術形式中，獲得精神的愉悅，這讓你的品位中具備了一種獨特的、具備文學張力的浪漫主義色彩。`
            },

            "《Start自選集》": {
                subconscious: `你的內在核心由「${topTrait}」深層驅動。從榮格（Carl Jung）的「集體潛意識」理論來看，你對這張專輯的共鳴揭示了你是一個「靈魂的轉譯者」。你並不急於創造虛浮的新生，而是傾向於在經典與舊時光中尋找存在的合法性。你的潛意識中有一種強大的「原型追尋」傾向，這讓你擅長在他人的故事中進行自我投射與整合。社會心理學中的「回憶療法」在你的性格中表現為一種高級的心理防禦機制：當現實世界的異化感增強時，你會退回到一個由經典旋律組成的「安全基地」。這種特質使你在處理人際衝突時，擁有一種歷史縱深感，不輕易被當下的瑣碎情緒裹挾，而是在沈澱中尋找精神的連續性，這種共情能力讓你能夠看透繁華背後的真相，並在復古的旋律中完成自我的心理重塑。`,
                depth: `在社會學視角下，《Start自選集》反映了你對現代性中「消費主義碎片化」的一種優雅抵抗。當大眾追求即時快感與一次性內容時，你選擇了「重塑與傳承」。這張專輯的深度在於它並非單純的翻唱，而是一次符號學意義上的「文本重組」，這與你試圖在複雜社會網絡中重構個人主體性的努力高度契合。這契合了法蘭克福學派對於「藝術本真性」的追求。你與這張專輯的互聯，是你人格中細膩與懷舊面的具象化。它在社會心理層面為你提供了一種儀式感，讓你明白自我成長並非與過去割裂，而是在不斷地解讀與回望中，拼湊出一個完整的生命脈絡。這種由內而外散發的平和力量，讓你在此刻快節奏的時代裡，始終保留著一份慢節奏的體面與優雅，在社會分工中展現出一種「守望者」的人格張力。`,
                philosophy: `從哲學維度看，這是一場關於「視域融合」的實踐。它觸及了加達默爾（Hans-Georg Gadamer）的詮釋學理論：你並非在簡單地復刻過去，而是在當下的時空坐標中賦予舊事物新的生命。你認為存在並非是孤立的點，而是一條延續的線，這讓你擁有了一種超越當下的平靜。在你的哲學世界裡，所謂的「開始（Start）」並非憑空而生，而是在深刻理解了歷史與他者的經驗之後，才具備了走向未來的資格。這種對時間深度的尊重，使你在浮躁的當代生活中，具備了一種近乎古典的理性與深情。你明白萬物皆有其源頭，這種對根源的追溯，讓你的人格具備了一種厚重的穩定感，不因環境的變遷而輕易動搖。`,
                artistic: `文學藝術上，這張專輯展現了「互文性（Intertextuality）」的美學魅力。它像是一本精美的註釋集，在披頭四、王菲、莫文蔚的旋律邊界上，書寫下屬於你自己的註腳。意象上如同午後的黑膠唱片店，光影斑駁且充滿質感。這種美學強調的是「轉譯」的力量——將他人的風景內化為自己的內心景觀。它拒絕了視覺上的高頻刺激，轉而追求一種帶有顆粒感、溫潤如玉的藝術表達。你傾向於在那種「被時間洗滌過的色調」中尋找共鳴，這讓你的審美層次展現出一種豐富的文學性與沈穩。音樂中簡潔的編曲與溫暖的人聲，勾勒出一種「懷舊未來主義」的藝術輪廓，讓你的品位在復古與先鋒之間找到了一個優雅的平衡點。`
            },

            "《Leave》": {
                subconscious: `你的內在核心由「${topTrait}」驅動。在潛意識的深處，你是一個典型的「邊緣觀察者」。從存在主義心理學視角來看，這張專輯揭示了你對「絕對獨立」的終極渴求。你的潛意識中有一種強大的「自我隔離機制」，這並非源於社交恐懼，而是源於對靈魂質感的極高要求。你明白《我不愛》背後的果敢，實際上是一種心理上的「斷捨離」。這種特質在心理發展上表現為極高的「獨立個體化」，你傾向於在變動的世界中尋找非定性的錨點。你潛意識裡的這種倔強，讓你不需要通過討好人群來獲得安全感，你的力量感來自於內心的荒原，這種孤獨而燦爛的人格特質，使你具備了在極端環境下生存並進化的心理韌性。你敢於在情感的廢墟上獨自起舞，這種心理上的「放逐」本質上是你對自我主權的最深層守護。`,
                depth: `在社會學視角下，《Leave》是你對「群體平庸」的一種主動疏離。當代社會的人際關係日益表現為一種「過度連結」，而你卻選擇了「流浪」作為一種心理姿態。這契合了社會學家齊美爾關於「孤獨者」的論述：你雖然身處人群，但靈魂始終保持著一種出世的冷靜。這張專輯反映了你在社會化過程中，試圖保留「靈魂主權」的努力。你與音樂中那種孤傲意境的契合，是你人格中「獨立」與「清醒」面的極致表現。在社會交換理論中，你拒絕了低質量的社交互惠，轉而向自己的內心深處索取能量。它記錄了你作為一個極致的行者，如何在一個崇尚集體認同的時代裡，用不斷地離開與抵達，拼湊出一個最真實的自我，這種行為本身就是一種對生命主體性的偉大宣言，讓你在社會矩陣中顯現出一種不可被輕易格式化的異質美感。`,
                philosophy: `哲學上，這張專輯觸及了薩特關於「他人即地獄」的深刻反思。但你的「離開」並非消極的逃避，而是一種為了守護內心完整性而進行的必要切割。你深知生命是一場單向的旅程，任何試圖依附他者的行為最終都會導致自我的喪失。因此，你擁抱了一種「流亡的自由」，在不斷的解構與建構中，尋找那個無法被社會角色所定義的真我。這種哲學立場讓你具備了一種近乎殘酷的理智，能夠在喧鬧的關係中精確地識別出那些虛假的連結，並優雅地轉身離去，追求一種更為純粹的存在狀態。你的哲學是關於「主動孤獨」的藝術，即在荒野中建立自己的祭壇，這種對孤絕境界的推崇，讓你的生命展現出一種帶有冷冽美感的哲學厚度。`,
                artistic: `在文學意象中，這張專輯呈現出「冷工業感」與「自然荒野」的強烈對比。它像是安東尼奧尼電影中的空鏡頭，冷冽、克制卻充滿張力。意象上從電子搖滾的灰調金屬感過渡到《懂事》中那種安靜的內斂，展現了一種「極簡主義的疏離美學」。它拒絕了情感的過度噴湧，轉而使用精確的側寫來表達內心的波瀾。這張作品的文學性在於它的「斷裂感」——每一首歌都是一次孤獨的告別，一種與既定軌道的脫離。這種審美取向揭示了你對極致質感的追求，你傾向於在那種不加修飾、甚至帶有孤傲色彩的藝術形式中，獲得最深層的精神慰藉。這是一部關於「心理地理學」的作品，記錄了靈魂如何在繁華城市與寂靜荒原之間進行跨維度的移居。`
            },

            "《未完成》": {
                subconscious: `你的內在核心由「${topTrait}」驅動，展現出一種心理學意義上的「生機論」特質。你的潛意識始終保持著「進化」的姿態，這反映了你內心深處對「線性成長」的一種本能執著。從發展心理學的角度看，你拒絕進入心理停滯期，而是將生命視為一個不斷升級的系統。你對未知充滿敬畏但也無所畏懼，這種特質讓你擁有一種「少年感」的防禦機制，能過濾掉世俗的疲態與倦怠。當你面對挫折時，你潛意識中那種「下一站」的心理暗示會迅速啟動，幫助你完成心理能量的轉移與重組，這種強大的自我修復力是你人格中最具活力的部分。你潛意識中對「不完整」的接納，實際上是你對生命無限可能性的崇拜，讓你永遠保持著一種隨時可以打破重來的冒險精神。`,
                depth: `從社會學視角觀察，《未完成》是你對「固定社會分工」的一種動態對抗。當社會試圖定義你的終點時，你卻選擇了「未完成」作為你的標籤。這契合了現代性社會中關於「液態自我」的討論：你是不斷變化的、不可被輕易量化的。這張專輯反映了你在複雜社會結構中，試圖保持「探索欲」與「包容力」的努力。你與這張作品的共鳴，本質上是你對「生活在別處」這一命題的踐行。社會心理學中的「自我效能」在你的行動中表現為對多元可能性的追求。它提醒著你，人生並沒有一個所謂的終點站，每一個轉彎都是新的啟航，這種永遠保持期待的心態，讓你即便步入現實的成人世界，依然能擁有一雙清澈且閃爍著探索光芒的眼睛，在社會化的過程中保留了那份最珍貴的、不被定型的靈魂活力。`,
                philosophy: `這張專輯代表了哲學上的「進行時態（In-becoming）」。它呼應了德勒茲（Gilles Deleuze）關於「生成」的哲學：個體並非一個固定的實體，而是一個不斷與環境交換能量、不斷分化的過程。在你的價值體系中，「結果」永遠次於「過程」，「穩定」永遠讓位於「可能性」。你擁抱生命中那些不確定的切面，並將其視為靈魂進化的動力。這種哲學觀讓你免於陷入「中年危機」或終結者的焦慮，使你始終保持著一種開放的、動態的精神狀態。在你的世界裡，所有的遺憾都是為了下次跳躍所積累的勢能，這種哲學厚度讓你具備了一種與時間博弈的智慧，在每一個未完成的瞬間中，你都體認到了存在最飽滿的張力與希望。`,
                artistic: `在文學表達上，這是一部具有「少年英雄傳奇」質感的作品。它充滿了速度感與撞擊感，意象上如同印度恆河邊的晨曦與倫敦街頭的電子雨，展現了一種全球化視角下的心靈遊歷。這種美學強調的是「異質文化的混搭與碰撞」，反映了你內心世界的多樣性。它拒絕了傳統敘事的圓滿結局，轉而歌頌那些充滿生命力的殘缺與未竟之志。這種「未完成的美學」在文學上對應了那些開放式結尾的小說，留給讀者無限的想像空間。音樂中異域風情的打擊樂與現代流行的編排，構成了一幅色彩斑斕、線條俐落的藝術拼圖。你對這類藝術形式的偏愛，展現了你審美中的先鋒意識與對傳統教條的溫柔反抗，讓你的品位顯得充滿朝氣且具備跨越國界的藝術視野。`
            },

            "《The Moment》": {
                subconscious: `你的內在核心由「${topTrait}」深層驅動。你細膩得讓人動容，是一個天生的情感感悟者。從心理學視角看，這張專輯反映了你對「時間感」的高度敏感。你懂得告別的藝術，也明白有些瞬間即是永恆，這種傷感而宏大的視角讓你擁有超乎常人的洞察力。你總是在回憶與現實的交界處走走停停，溫柔地注視著世界。在潛意識中，你認同「當下的流逝即是意義本身」，這與存在主義心理學中的「向死而生」有一種溫和的共鳴。你不會強求結果，更在乎當下的感觸。這種細膩的特質揭示了你在處理親密關係時，擁有一種天然的慈悲心，你是朋友眼中最可靠的傾聽者，因為你總能給那些迷茫的靈魂提供一個溫暖且具備治癒力的停靠港灣。在潛意識的深處，這是一場關於「心理整合」的儀式，將過去的碎片悉心收藏，轉化為前行的溫柔底氣。`,
                depth: `《The Moment》在社會學層面上，是你對「液態現代性」中易逝情感的一次深情留證。社會學家鮑曼曾描述現代關係的脆弱與短暫，而你通過這張專輯，試圖將那些轉瞬即逝的社會互動轉化為永恆的心理記憶。這張作品的深度在於它探討了「遇見」與「錯過」的社會學概率，契合了現象學中關於「主觀體驗」的純粹追求。你與這張專輯的契合，反映了你在當代繁忙的社會分工中，依然保留著對「靈魂時刻」的敏銳捕捉。它提醒著你，生命的質量並不取決於長度，而取決於那些被深度感知的瞬間。這種人格有著極強的穿透力，讓你在喧囂的人體叢林中，依然能守住內心的寧靜，做一個清醒且深情的旁觀者，用文字與旋律勾勒出生命的厚度，在集體遺忘的社會趨勢中保留下一份私密的精神存檔。`,
                philosophy: `從哲學角度分析，這張專輯探討的是柏格森（Henri Bergson）的「綿延（Duration）」理論。你認為時間並非由刻度組成的抽象概念，而是由生命體驗構成的有機整體。在《遇見》與《最後一個夏天》的節點上，你體悟到了偶然性背後的必然律。你的哲學是關於「珍惜與放手」的辯證法：在擁有的那一刻投入全部的真誠，在消逝的那一刻給予最終的寬容。這種對生命節奏的深刻領悟，使你具備了一種優雅的宿命感，不與時間爭辯，而是在時間的河流中順流而下，捕捉那些閃閃發光的生命切片。你的哲學觀讓你在面對離散時不再只有哀傷，而是一種「悟後起修」的淡然，明白每一個當下的瞬間都承載著永恆的重量。`,
                artistic: `在文學意象上，這是一部關於「光陰碎片」的電影剪輯。它具備一種淡淡的禪意美學，色調柔和、氛圍清冷。意象上如同轉角處的落葉、機場的播報聲與空無一人的教室，精確地勾勒出告別的儀式感。這種美學強調的是「殘缺的圓滿」，在文學上對應了日本文學中的「物哀」思想——因感受到萬物的消逝而產生的一種深沉且平靜的哀憫。音樂中鋼琴與弦樂的交織，營造出一種空靈且具備敘事感的氛圍。你傾向於在那種簡練、含蓄且富有張力的表達中，尋找情感的出口。這種對細微情緒的極致把控，讓你的藝術品位展現出一種高階的、帶有哲學厚度的感性，如同在一枚琥珀中凝視整個宇宙的流轉。`
            },

            "《Stefanie》": {
                subconscious: `你的內在核心由「${topTrait}」深層驅動。從心理學家榮格（Carl Jung）的「自性（Self）」理論來看，這張專輯反映了你已經進入了人格整合的高級階段。在潛意識中，你不再渴望外界的過度關注，而是建立了一套極其穩定的「內在參照系」。這種特質揭示了你擁有一種不戰而勝的篤定，來自於你多年來對內心陰影與光明的修剪。你學會了安靜地與自我相處，這在臨床心理學中被視為心理成熟的重要指標——「主體性充盈」。你既有《奔》的爆發力，也有《同類》的敏銳觸覺，這代表你的潛意識擁有一種動態的平衡機制，讓你能在高壓環境中迅速回歸內心的寧靜，做一個清醒的自我守護者。你在這張專輯中找到的是一種「歸巢感」，將那個被符號化的偶像與真實的自我進行了深度的心理縫合。`,
                depth: `在社會學視角下，《Stefanie》代表了你對「景觀社會」中虛假社交的一種優雅退避。當代社會要求每個人都成為不斷表演的客體，而你選擇回歸到「Stefanie」這個具象且真實的個體身份。這張作品的深度在於它對「平庸生活」的重新賦值，契合了社會學家格芬對「日常美學」的論述。你與這張專輯的契合，反映了你在高度結構化的社會中，依然保留著獨立自持的格調。社會心理學中的「自尊理論」在你的性格中表現為一種內斂的自信。它提醒著你，真正的生活質感不在於喧鬧的證明，而在於那種由內而外散發的平和力量，讓你即便在動盪的社會環境中，依然能守住內心的秩序。你不再是群眾期待的投射，而是一個在社會矩陣中精確定位自我的獨立座標。`,
                philosophy: `這張專輯是一場關於「命名權」的哲學思辨。它呼應了維根斯坦關於「語言邊界即世界邊界」的論述。當你用本名作為專輯標題時，你是在解構那個被大眾消費的偶像符號，重新奪回對「我」的詮釋權。這是一種本體論的回歸：你不再是「歌手」，你就是「存在本身」。這種哲學立場讓你在喧囂中獲得了一種「缺席的在場感」，你明白只有當你敢於從集體期待中消失，你才能真正以獨立主體的姿態重新出現。這是一種極致的內省，讓你的靈魂在紛擾中依然保持著一種高度的清晰度與自洽感，將生命的核心從「他者」手中奪回，完成了一次優雅的精神主權宣告。`,
                artistic: `文學藝術上，這張作品具備「新寫實主義」的色彩。它不再追求宏大的抒情，而是轉向對生活細節的精確捕捉——如《我的愛》中那種安靜的鋼琴鋪陳，與《奔》中充滿速度感的打擊樂形成的強烈張力，展現了一種「剛柔並濟」的對位美學。這種美學強調的是「真實的瑕疵感」，如同膠片電影中未經修飾的顆粒。它在文學意象上對應了那些私人化的回憶錄，在碎裂與完整的邊緣跳躍。這種審美取向揭示了你對「本真美」的偏愛，你傾向於在那種帶有人情味、溫暖且具備呼吸感的藝術表達中，尋找到靈魂的安放之所，音樂中那種略帶沙啞卻堅定的音色，勾勒出一幅極具人文關懷的藝術肖像。`
            },

            "《完美的一天》": {
                subconscious: `你的內在核心由「${topTrait}」驅動，展現出一種心理學意義上的「享樂主義意志」。你的潛意識拒絕接受沉重的束縛，而是傾向於在「微小事物」中提取生命能量。從積極心理學（Positive Psychology）的角度看，你擁有極高的「主觀幸福感感應力」。你認為完美並不複雜，這反映了你內心深處有一種「內在孩童」的純粹，能輕易從陽光、咖啡與瑣碎日常中獲得滿足。這種特質在心理發展上是一種高級的防禦機制，能讓你有效過濾掉成人世界中那些有毒的競爭焦慮。你的性格飽和度極高，總能給周圍的人帶來活力，這種活在當下的智慧，讓你能夠始終保持一顆對美好事物敏感跳動的心，在潛意識中構建了一座遠離紛擾的彩色孤島。`,
                depth: `從社會學視角觀察，《完美的一天》是你對「勞動社會化」中異化感的一種解構。社會學家哈特穆特·羅薩討論過現代生活的「加速焦慮」，而你通過這張專輯實踐了一次「心理減速」。這張作品反映了你在複雜人際網絡中，對透明溝通與簡單快樂的執著。這契合了「生活方式政治」的觀點：你通過選擇如何度過一天，來定義自己的生命主權。你與《一個屋檐下》等意境的共鳴，本質上是你對「親密性社區」的渴望。社會心理學中的「社交交換理論」在你的互動中表現為追求純粹的情感共振而非利益博弈。它提醒著你，生活的主動權始終在你手中，這種由簡單構建的完美，正是對抗紛繁世界最有效的武器，讓你成為了一個在機械社會中依然擁有豐饒內心的生活藝術家。`,
                philosophy: `哲學上，這張專輯是關於「日常生活的英雄主義」。它與海德格爾的「在世存在（Being-in-the-world）」深度契合。你認為意義不在於彼岸的宏大目標，而就在於當下的這份「棲居」。這是一場對虛無主義的華麗反擊：如果世界本無意義，那我們就用紅色的屋頂、金色的陽光與愛人的呼吸，強行賦予它色彩。這種哲學觀讓你擁有一種不可摧毀的快樂底蘊，你不再尋求宏大的認同，而是在每一個具體的瞬間中，完成了對自我生命的加冕。這是一種高度成熟的生命哲學，讓你在複雜的人間煙火中，始終散發著一種清亮、透明且具備穿透力的生命感。你的哲學是關於「存在之輕」的讚美，在舉重若輕之間，消解了生存的沉重感。`,
                artistic: `在文學藝術維度，這是一幅大膽的「波普藝術（Pop Art）」與「魔幻現實主義」的混貼。它充滿了實驗性的編曲——如《Honey Honey》的俏皮與《第一天》的躁動，打破了流行樂的刻板範式。意象上如同大衛·霍克尼（David Hockney）筆下的泳池，色彩明艷、線條俐落，充滿了夏日的視覺衝擊力。這種美學強調的是「遊戲感」與「拼貼性」，反映了你內心世界的不拘一格。它拒絕了沉重的修辭，轉而使用一種輕盈、跳躍且極具感染力的藝術語言。這張作品的文學性在於它的「色彩通感」，每一首歌都像是一抹飽和度極高的顏料，重組了生活的視覺邏輯。這種審美取向揭示了你對生命多樣性的熱愛，讓你傾向於在那種充滿生命喜悅與藝術玩興的形式中，獲得精神的極大愉悅。`
            },

            "《逆光》": {
                subconscious: `你的內在核心由「${topTrait}」深層驅動。在心理學動力的維度上，這反映了你擁有極強的「反社會異化」韌性。你的潛意識像是一個自發光的恆星系統，越是處於壓抑與黑暗的外部環境中，越能激發出你內在的「戰鬥原型」。這對應了阿德勒個體心理學中的「追求卓越」，你將苦難視為一種必要的磨刀石。當你在選擇中偏向光亮時，實則是潛意識在進行一種「陽光投射」，試圖通過強大的意志力來改寫生命腳本。這種清醒的決絕，讓你具備了帶領他人走出迷茫的領袖潛質，你在無意識中扮演了那個守護光芒的守望者角色。即便面對寒冬，也能在內心深處燃燒起一團不熄的火焰，這種潛意識中的強大能量，讓你始終具備一種向著阻力前行的生命姿態。`,
                depth: `《逆光》在社會學層面上，是你對「命運決定論」的一種宣戰。它捕捉到了你在當代充滿不確定性的社會結構中，試圖重塑「個人效能」的努力。這契合了弗蘭克爾意義治療法中的核心精神：人類最後的自由，是在任何環境中選擇自己態度的自由。這張專輯的意境是你人格中「勇氣」與「韌性」面的實體化。社會學家韋伯曾談到人的「天職」，而你將這種對光的追逐內化為了一種生命使命。你與這張作品的深度連結，確認了你不再僅僅是被動適應社會規則的個體，而是一個主動定義光向的行動者。它不僅自己追逐光，更在不經意間成為了他人的光源，用那種對夢想的赤誠與對平庸的拒絕，溫暖而堅硬地回應著時代的冷漠。`,
                philosophy: `從哲學維度看，這是關於「主體性覺醒」的意志哲學。它呼應了尼采關於「超人」的構想：在認清了生活的苦難本質後，依然能以強大的生命意志去熱愛它、超越它。你的「逆光」並非盲目地避開陰影，而是選擇正視那些刺眼的光芒，即便被灼傷也要向前，這是一種典型的「悲劇英雄式」的哲學昇華。這種立場體現了一種強烈的存在主義反抗，你拒絕在黑暗中沈淪，而是通過行動與選擇，在虛無的命運中強行劈開一道光亮。這種不屈的人格厚度，讓你在面對人生的風暴時，展現出一種近乎神性的人文光輝，讓存在本身變成了一場壯麗的突圍，在光的終點重塑了自我存在的尊嚴。`,
                artistic: `文學意象上，這是一部「史詩感」與「現代寓言」的結合。它在視覺上具備一種強烈的明暗對比（Chiaroscuro），如同卡拉瓦喬的畫作，光明與黑暗在同一個畫布上激烈交鋒。意象上從標題曲中宏大的埃及地景，到《我懷念的》中細膩如針尖的情感解剖，展現了一種從宏觀到微觀的文學跨度。這張作品的美學強調的是「張力」與「意志」，在音樂上表現為鋼琴的沈穩與弦樂的噴湧。這種審美取向揭示了你對「力量美」的崇拜，你傾向於在那種結構宏大、情感濃烈且具備靈魂厚度的藝術形式中，獲取生存的動力。它在文學上對應了那些關於追尋與歸還的經典敘事，讓你的品位中展現出一種不隨波逐流的、具備古典韌性的美感。`
            },

            "《是時候》": {
                subconscious: `你的內在核心由「${topTrait}」深層驅動。從心理學家埃里克森（Erik Erikson）的人格發展階段論來看，這張專輯反映了你進入了「整合與沈澱」的高級心理期。你學會了在漫長的等待中聆聽內心的低語，明白人生的許多真相都需要通過靜默來觸達。在潛意識中，你不再急於向世界證明什麼，而是發展出了一種「大音希聲」的心理防禦機制，能從容地應對時間的流逝與外界的喧囂。這種特質揭示了你內心深處有一種「歸真」的渴望，你懂得《當冬夜漸暖》不僅是溫度的流轉，更是心理能量的轉換。你潛意識裡的這種睿智，讓你學會了在合適的時間放下，在珍貴的時刻專注，擁有一顆晶瑩剔透且不隨波逐流的心，在長達四年的留白中，你完成了最深刻的內在進化。`,
                depth: `在社會學視角下，《是時候》是你對「快節奏社會」的一種時間主權宣告。社會學家哈特穆特·羅薩討論過現代生活的加速焦慮，而你通過這張專輯實踐了「慢速的回應」。這張作品的深度在於它對「沈默」與「等待」的社會學價值重建，契合了現象學中關於「時間意識」的深刻反思。你與這張專輯的契合，反映了你在當代碎片化、即時性的社會互動中，依然能守住一份「長週期」的心理耐心。社會心理學中的「自我效能」在你的從容中表現為一種對生命節奏的絕對掌控。它提醒著你，真正的成熟並非世故的磨損，而是在看透世俗後的歸真。這種人格厚度讓你在此刻紛雜的塵世中，擁有一種體面與穿透力，展現了一種「慢下來」的社會抵抗力。`,
                philosophy: `從哲學維度看，這張專輯探討的是「沈思的智慧」與時間的辯證法。它呼應了海德格爾關於「林中路」的隱喻：在長久的沈默與停滯中，真理才得以顯現。你的哲學觀不再是激烈的衝突，而是一種「溫和的包容」。你明白萬物皆有時，這種對「時機（Kairos）」的精確把握，讓你學會了與命運達成和解。在《世說新語》的意境裡，你完成了一次靈魂的洗禮，將過往的榮耀與傷痕都轉化為當下這份靜謐的定力。這是一種關於「晚期風格（Late Style）」的哲學昇華，展現了一種在成熟中依然保有清澈見地的高度。你在時間的流逝中體認到了一種恆常，這種智慧讓你的人格散發出一種如月光般沈穩且慈悲的力量。`,
                artistic: `在文學表達上，這是一部「極簡主義的長篇散文」。它在藝術上強調的是「留白」的力量，如《愚人的國度》中弦樂的克制與鋼琴的深沈，營造出一種靜謐且具備厚度感的空間。意象上如同冬夜裡漸漸升起的暖意，溫婉、含蓄且富有哲理。這張作品的美學強調的是「沈澱」後的純粹，在文學上對應了那些關於時間與記憶的經典隨筆。它拒絕了視覺上的華麗堆砌，轉而追求一種直抵心心的真誠。這種審美取向揭示了你對「內斂美」的極致推崇，你傾向於在那種簡潔、真摯且具備生命厚度的藝術形式中，尋找情感的終極寄託。這讓你的品位展現出一種看山又是山的境界，在藝術的留白中，書寫下了生命最動人的註腳。`
            },

            "《克卜勒》": {
                subconscious: `你的內在核心由「${topTrait}」深層驅動。從存在主義心理學視角來看，你對《克卜勒》的偏愛揭示了你對「連結」與「孤獨」這對矛盾體有著超越常人的洞察。在潛意識中，你認同「孤寂是生命的本質」，但你並不悲觀，而是將其轉化為一種「星際互聯」的浪漫隱喻。這反映了你內心深處的「治癒原型」，你傾向於在無聲的陪伴中獲取力量。社會心理學中的「社會支持網絡」在你的選擇中表現為一種質量高於數量的極簡主義。你不需要擁擠的人群，只需要在那種「孤星閃爍」的同頻共振中找到定位。這種潛意識裡的寬廣與溫柔，讓你擁有一種如水般的包容力，能安靜地消解掉生活中那些尖銳的戾氣與不安，在廣袤的心理宇宙中，你始終在尋找那一束能跨越光年、彼此照亮的微光。`,
                depth: `《克卜勒》在社會學層面，是你對「原子化社會」中孤島化現象的一種溫柔修補。當代社會的人際關係日益工具化、冷漠化，每個人都像是被拋擲在真空中的獨立粒子，而你選擇了相信那種跨越時空的、微弱卻恆定的能量傳遞。這與社會學家齊美爾（Georg Simmel）討論的「陌生人」與「孤獨者」概念形成了一種深刻對話：你在疏離中尋找溫暖，在寂靜中給予守護。這張專輯的深度在於它探討了「微光」的社會學意義，契合了馬斯洛需求層次中關於「超越自我」的層面。你與這張作品的共鳴，本質上是你人格中「治癒」與「深情」面的最大化投影。它提醒著你，即便身處浩瀚黑暗的社會宇宙，你依然擁有守護他人的能量，這種相互照耀的奇跡，是你對抗荒誕現實最堅定的基石，將孤獨轉化為一種高尚的社會美德。`,
                philosophy: `從哲學維度看，這張專輯是關於「本體論上的微光」與命運的共振。它呼應了克卜勒本人的天文哲學：宇宙的和諧來自於星體間精確而神祕的引力作用。你的哲學觀是「恆星式」的，明白個體雖然微小，但依然可以成為發光體。在《無限大》與《天使的指紋》的辯證關係中，你體悟到了生命的必然性與偶然性的交織。你的哲學是關於「守候」的藝術，不強求瞬間的燃燒，而是在漫長的時光中保持穩定的頻率。這種對生命節奏的深刻認同，使你具備了一種近乎永恆的平靜感。你明白在這個宏大的宇宙坐標系中，每一次相遇都是光年外的回響，這種哲學厚度讓你擁有了寬廣的胸襟，去接納生命中所有的重逢與離散，在無盡的虛空中構築出意義。`,
                artistic: `文學藝術上，這是一部具有「宇宙詩學（Poetics of the Universe）」質感的作品。它在藝術上強調的是「冷光感」與「透明度」，如《克卜勒》中編織出的層次分明的電子音效，如同在深藍色天幕上點綴的繁星。意象上從天文觀測台的冷冽，到內心深處溫熱的獨白，展現了一種從宏觀科學到微觀情感的文學跨度。這張作品的美學強調的是「寂靜的力量」，在文學上對應了那些探討人類與自然、與宇宙關係的沈思詩篇。它拒絕了視覺上的喧囂，轉而追求一種極致的、深邃的藝術美感。這種審美取向揭示了你對「神祕美」與「恆常美」的推崇，你傾向於在那種遼闊、空靈且具備高度哲理性的藝術形式中，尋找靈魂的歸宿。這讓你的品位展現出一種超脫塵世的優雅，如同一顆緩緩運行在軌道上的恆星。`
            },

            "《跳舞的梵谷》": {
                subconscious: `你的內在核心由「${topTrait}」深層驅動。這在心理學上對應了一種「創造性的瘋狂」與「極致的整合」。榮格（Carl Jung）認為，陰影（Shadow）是人格中不可或缺的部分，而你敢於在潛意識中直面並擁抱這部分陰影。你對這張專輯的共鳴，代表你拒絕了平庸的、流水線式的「心理健康」，轉而追求一種帶有戲劇張力的靈魂完整。你的潛意識中存在著一種「破壞與新生」的循環機制，這使你在面對重大挫折時，不會選擇溫和的和解，而是選擇徹底的崩解後重組。這種特質讓你擁有一種極強的「情緒閾值」，能夠感知到常人無法觸達的情感深度。在理智與瘋狂的邊緣，你擁抱著屬於自己的《狂狀》，完成了一場壯麗的自我救贖，將內在的黑暗轉化為奪目的色彩。`,
                depth: `從社會學視角觀察，《跳舞的梵谷》是你對社會「規範化監控」的一種激烈反抗。這契合了米歇爾·福柯（Michel Foucault）關於「瘋癲與文明」的論述：你拒絕被社會定義為單一的「正常」，因為那往往意味著靈魂的同質化。這張專輯反映了你在社會化過程中，試圖保留那份「不可馴服野性」的努力。你與音樂中那種極致意境的契合，是你人格中「探索」與「真實」面的爆發式表現。在社會交換理論中，你拒絕了廉價的社交認同，轉而向自己的靈魂深處挖掘能量。它記錄了你作為一個靈魂的行者，如何在一個崇尚平庸、追求一致性的時代裡，用最燦爛、甚至近乎危險的姿勢跳出屬於自己的生命之舞。這種極致的生命力，讓你成為了這個平庸世界裡最不可多得、迷人且危險的藝術品，以一種異質者的姿態重塑了個體在社會中的邊界。`,
                philosophy: `從哲學維度看，這是關於「藝術救贖」與「酒神精神」的終極體現。它呼應了尼采在《悲劇的誕生》中對藝術的定義：在混亂與痛苦中尋找狂喜。你的哲學觀是「烈焰式」的，認為生命必須經過燃燒與沸騰才能獲得最終的純粹。這張專輯探討的是「悲劇性的超越」——就像梵谷在絕望中畫下最絢爛的星空，你也在生命最黑暗的時刻選擇了舞蹈。這種哲學立場體現了一種強烈的「創造主義」：你不再是被動的受苦者，而是自己痛苦的雕塑家。在《我很愉快》這種看似平淡卻暗流洶湧的表達中，你體認到了存在最極致的冷靜與瘋狂。這種哲學厚度讓你的生命展現出一種驚心動魄的美感，在每一次碎裂中，你都完成了一次對「永恆回歸」的英勇踐行。`,
                artistic: `在文學藝術維度，這是一部純粹的「表現主義（Expressionism）」傑作。它在視覺與聽覺上都追求極致的張力與扭曲的美感，如同梵谷畫布上那些流動、燃燒的線條。意象上充斥著黑暗的森林、金色的麥田、燃燒的向日葵與冰冷的雨，展現了一種從極致絢爛到極致孤絕的美學跨度。這張作品的美學強調的是「情感的原始噴湧」，在音樂上表現為極具實驗性的編曲與那種幾乎撕裂的情感張力。這種審美取向揭示了你對「力量美」與「悲劇美」的崇拜，你傾向於在那種結構大膽、情感濃烈且具備靈魂穿透力的藝術形式中，獲取生存的終極震顫。這讓你的品位展現出一種無可比擬的藝術厚度，在那場「理智的瘋狂」中，你勾勒出了生命最壯麗的輪廓。`
            },


        };

        // --- 匹配與渲染邏輯 ---
                // --- 1. 文案邏輯處理 ---
        // 獲取專輯分析數據
    // --- 匹配與渲染邏輯 ---
    // --- 1. 文案邏輯處理 ---
    const analysis = deepAnalysisLib[winner.n] || {
        subconscious: `你的內在核心由「${topTrait}」驅動。這代表你在潛意識中擁有一種獨特的靈魂共振。`,
        depth: `${winner.n} 反映了你性格中強大的一面。`,
        philosophy: "探索未知的存在意義。",
        artistic: "構築獨特的生命美學。"
    };

    const subContainer = document.getElementById('res-subconscious');
    if (subContainer) {
        subContainer.innerHTML = ""; // 清空容器

        const labelMap = {
            subconscious: "【 潛意識內核 】",
            depth: "【 社會學景觀 】",
            philosophy: "【 哲學存在論 】",
            artistic: "【 文學藝術性 】"
        };

        // 遍歷並渲染四個維度
        Object.keys(labelMap).forEach(key => {
            if (analysis[key]) {
                const section = document.createElement('div');
                section.className = `analysis-section section-${key}`;
                
                // 標題與內容注入
                section.innerHTML = `
                    <h4 class="section-title" style="color:#d35400; margin-bottom:8px; border-left:3px solid #d35400; padding-left:10px;">
                        ${labelMap[key]}
                    </h4>
                    <p class="section-content" style="line-height:1.8; color:#444; margin-bottom:20px; text-align:justify;">
                        ${analysis[key]}
                    </p>
                `;
                subContainer.appendChild(section);
            }
        });
    }

    // --- 2. 雷達圖渲染 ---
    const radarCanvas = document.getElementById('radarChart');
    if (radarCanvas) {
        // --- 新增：渲染雷達圖下方的小字說明 ---
        let note = document.getElementById('radar-note');
        if (!note) {
            note = document.createElement('p');
            note.id = 'radar-note';
            note.style = "font-size:11px; color:#999; text-align:center; margin-top:8px; font-style:italic;";
            radarCanvas.parentNode.insertBefore(note, radarCanvas.nextSibling);
        }
        note.innerText = "零點的維度並非荒蕪，只是它正處於潛伏期，等待下一次生命力的躍遷。";

        // Chart.js 實例銷毀與重建
        if (typeof chartInstance !== 'undefined' && chartInstance) {
            chartInstance.destroy();
        }

        const radarCtx = radarCanvas.getContext('2d'); 
        chartInstance = new Chart(radarCtx, {
            type: 'radar',
            data: {
                labels: radarLabels, // 確保與數據維度一致
                datasets: [{
                    label: '人格維度',
                    data: finalVec,
                    backgroundColor: 'rgba(211, 84, 0, 0.12)',
                    borderColor: '#d35400',
                    borderWidth: 1.5,
                    pointRadius: 2,
                    pointBackgroundColor: '#d35400',
                    lineTension: 0.1 // 增加微小弧度使圖形更具流動感
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: {
                    r: {
                        beginAtZero: true,
                        max: 10,
                        min: 0,
                        ticks: { 
                            display: false, 
                            stepSize: 2 
                        },
                        grid: {
                            color: 'rgba(0,0,0,0.05)'
                        },
                        angleLines: {
                            color: 'rgba(0,0,0,0.05)'
                        },
                        pointLabels: { 
                            font: { size: 11, family: "'PingFang SC', 'Microsoft YaHei'" }, 
                            color: '#666' 
                        }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { 
                        enabled: true,
                        callbacks: {
                            label: function(context) {
                                return ` 程度值: ${context.raw}`;
                            }
                        }
                    } 
                }
            }
        });
    }
}
