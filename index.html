<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遇見自己 - 孫燕姿專輯人格測試</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-base: #fcfaf8;
            --accent: #d35400;
            --text-main: #34495e;
            --text-sub: #a0a0a0;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* 开始页面样式 */
        #welcome-ui {
            text-align: center;
            animation: fadeIn 1s ease;
        }

        .welcome-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .welcome-sub {
            font-size: 1rem;
            color: var(--text-sub);
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        .btn-start-quiz {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(211, 84, 0, 0.2);
        }

        .btn-start-quiz:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(211, 84, 0, 0.3);
        }

        /* 测验页面样式 */
        #quiz-ui { display: none; }
        .progress-container { width: 40px; height: 2px; background: #eee; margin-bottom: 40px; overflow: hidden; border-radius: 2px; }
        #progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .step-info { font-size: 0.75rem; letter-spacing: 0.1em; color: var(--text-sub); margin-bottom: 8px; }
        .q-text { font-size: 1.4rem; font-weight: 300; line-height: 1.6; margin-bottom: 40px; min-height: 4.8rem; }
        .options-group { display: flex; flex-direction: column; gap: 12px; }
        .opt { border: none; background: var(--card-bg); padding: 20px; border-radius: 12px; text-align: left; font-size: 0.95rem; color: var(--text-main); cursor: pointer; transition: all 0.2s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .opt:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); color: var(--accent); }

        /* 结果页 */
        #result { display: none; text-align: center; animation: fadeIn 1s ease forwards; }
        .album-name { font-size: 2.2rem; font-weight: 700; margin-bottom: 30px; color: var(--accent); }
        .desc-text { font-size: 0.9rem; line-height: 1.8; color: #7f8c8d; margin: 30px 0; text-align: justify; }
        #radar-container { margin: 0 auto; max-width: 300px; }
        .btn-restart { margin-top: 40px; background: transparent; border: 1px solid #ddd; padding: 12px 30px; border-radius: 25px; color: var(--text-sub); cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-out { opacity: 0; }
    </style>
</head>
<body>

<div id="app">
    <div id="welcome-ui">
        <div class="welcome-title">遇見自己</div>
        <div class="welcome-sub">孫燕姿專輯人格感應</div>
        <button class="btn-start-quiz" onclick="startQuiz()">開始感應</button>
        <div style="font-size: 0.7rem; color: #bbb; margin-top: 30px; letter-spacing: 1px;">
            * 本測驗僅供娛樂，不上升個人品格評價（由FrankyLam製作）
        </div>
    </div>

    <div id="quiz-ui">
        <div class="progress-container"><div id="progress-fill"></div></div>
        <div class="step-info" id="step-tag"></div>
        <div class="q-text" id="q-text"></div>
        <div class="options-group" id="opt-box"></div>
    </div>

    <div id="result">
        <span style="font-size: 0.8rem; color: #a0a0a0; letter-spacing: 2px;">SOUL ALBUM MATCH</span>
        <div class="album-name" id="res-title"></div>
        
        <div id="radar-container" style="max-width: 350px;"><canvas id="radarChart"></canvas></div>
        
        <div class="desc-text" id="res-desc"></div>

        <div style="margin-top: 30px; text-align: left; padding: 0 10px;">
            <h3 style="font-size: 0.95rem; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 10px; margin-bottom: 12px;">潛意識剖析</h3>
            <p id="res-subconscious" style="font-size: 0.85rem; line-height: 1.6; color: #7f8c8d; margin-bottom: 25px;"></p>
            
            <h3 style="font-size: 0.95rem; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 10px; margin-bottom: 12px;">專輯深度解讀</h3>
            <p id="res-depth" style="font-size: 0.85rem; line-height: 1.6; color: #7f8c8d;"></p>
        </div>

        <div style="font-size: 0.7rem; color: #ccc; margin-top: 50px; padding: 20px; border-top: 1px dashed #eee; line-height: 1.5;">
            本測驗僅供娛樂與社交分享使用，結果基於特定算法模擬，不代表專業心理評估。內容均不上升至個人品格評價。（由FrankyLam製作）
        </div>

        <button class="btn-restart" onclick="location.reload()">RETAKE TEST</button>
    </div>
</div>


<script>
    const questions = [
        { q: `1. 當你推開窗，看見太陽像火球一樣灼燒著城市，你的第一念頭是？`, o: [
            { text: `想哭，這種光亮讓我想起童年那個再也回不去的午後`, v: [100, 10, 20, 80, 90, 20, 40, 30, 10, 100, 20, 30, 40, 20, 100] },
            { text: `計算紫外線強度，這是一場精準的自然屠殺，我需要躲避`, v: [0, 100, 40, 10, 20, 100, 10, 20, 90, 20, 30, 100, 90, 60, 10] },
            { text: `衝進烈日裡，看皮膚被灼傷、看視網膜燒出黑影，這才是活著`, v: [30, 50, 100, 20, 60, 40, 30, 50, 100, 40, 80, 60, 70, 100, 30] },
            { text: `拉上窗簾，讓世界在外面腐爛，我與黑暗同在`, v: [60, 90, 10, 100, 40, 70, 100, 100, 30, 70, 100, 90, 100, 50, 40] }
        ]},
        { q: `2. 如果生命只剩下最後 24 小時，你會如何處理你的遺物？`, o: [
            { text: `把每一封信、每一件舊衣服寄給對應的人，留下最後的體溫`, v: [100, 0, 10, 100, 100, 10, 50, 30, 0, 100, 10, 20, 40, 10, 100] },
            { text: `寫好遺囑，清空硬碟，註銷帳號，像從未存在過一樣精準消失`, v: [0, 100, 40, 20, 10, 100, 20, 30, 100, 10, 40, 100, 100, 60, 10] },
            { text: `在空地上架起大火，把這輩子的所有積蓄和回憶付之一炬`, v: [40, 40, 100, 40, 50, 60, 70, 80, 100, 50, 90, 70, 80, 100, 30] },
            { text: `隨便它們爛在哪裡，死後的廢墟與我何干？`, v: [50, 80, 30, 80, 30, 80, 100, 100, 60, 80, 100, 90, 100, 80, 60] }
        ]},
        { q: `3. 面對一段已經徹底腐爛、卻又離不開的關係，你會？`, o: [
            { text: `繼續互相折磨，在眼淚和鮮血中感受「我還愛著」的錯覺`, v: [100, 10, 30, 90, 100, 20, 60, 40, 10, 100, 20, 30, 50, 20, 100] },
            { text: `計算得失後，在某個深夜無聲地搬走，拉黑所有聯絡方式`, v: [10, 100, 50, 30, 20, 100, 30, 40, 90, 20, 50, 100, 90, 70, 10] },
            { text: `用最惡毒的話語激怒對方，在徹底的崩潰中大笑著轉身`, v: [50, 60, 100, 40, 70, 80, 90, 80, 100, 60, 100, 80, 90, 100, 40] },
            { text: `身體還在那裡，但靈魂已經搬走了，對方只是空氣`, v: [40, 90, 20, 100, 40, 90, 100, 100, 70, 80, 100, 100, 100, 80, 50] }
        ]},
        { q: `4. 在一場盛大的音樂節現場，當音樂到達最高潮時，你會？`, o: [
            { text: `閉上眼，在人群中無聲地顫抖，感覺被某種集體情緒治癒`, v: [100, 20, 40, 80, 100, 30, 60, 50, 20, 100, 40, 50, 60, 40, 100] },
            { text: `看著台上發瘋的人和台下流淚的人，思考這場群體催眠的機制`, v: [10, 100, 30, 20, 10, 100, 20, 40, 100, 20, 50, 100, 90, 60, 20] },
            { text: `聲嘶力竭地尖叫直到失聲，撞擊身邊的一切，感受骨骼的痛楚`, v: [60, 60, 100, 50, 80, 70, 80, 90, 100, 70, 90, 80, 100, 100, 50] },
            { text: `在最吵鬧的時候感到最極致的寂靜，彷彿身處宇宙深處`, v: [70, 90, 40, 100, 50, 90, 100, 100, 80, 90, 100, 100, 100, 90, 70] }
        ]},
        { q: `5. 關於「遺忘」，你最真實的恐懼是？`, o: [
            { text: `害怕那個曾深愛的人，在未來的某天記不起我的聲音`, v: [100, 10, 20, 100, 100, 20, 50, 40, 10, 100, 20, 30, 50, 20, 100] },
            { text: `害怕大腦功能退化，失去對邏輯與知識的絕對掌控`, v: [10, 100, 50, 30, 20, 100, 30, 40, 100, 20, 50, 100, 90, 70, 10] },
            { text: `害怕自己變成一個每天按部就班、連恨都不再強烈的活死人`, v: [60, 60, 100, 60, 80, 90, 80, 90, 100, 70, 100, 80, 90, 100, 50] },
            { text: `並不恐懼，遺忘是宇宙最溫柔的慈悲，寂滅才是終點`, v: [50, 90, 30, 100, 40, 100, 100, 100, 80, 90, 100, 100, 100, 90, 70] }
        ]},
        { q: `6. 如果你可以殺死過去某個時刻的自己，你會選？`, o: [
            { text: `那個因為懦弱而放開某雙手、留下終身遺憾的自己`, v: [100, 10, 20, 90, 100, 10, 40, 30, 10, 100, 20, 30, 40, 20, 100] },
            { text: `那個因為情緒化而做錯決策、導致效率低下的自己`, v: [10, 100, 50, 20, 20, 100, 20, 40, 100, 20, 40, 100, 90, 60, 10] },
            { text: `那個平庸、順從、試圖融入集體的假面自己`, v: [50, 50, 100, 50, 70, 80, 80, 90, 100, 60, 90, 80, 90, 100, 40] },
            { text: `沒有任何意義，過去和現在都只是灰塵，何必動手？`, v: [40, 90, 30, 100, 40, 90, 100, 100, 70, 80, 100, 100, 100, 90, 70] }
        ]},
        { q: `7. 深夜在鏡中看著疲憊的雙眼，你最想做的是？`, o: [
            { text: `輕撫鏡面，對自己說一聲「你辛苦了」，然後流淚`, v: [100, 10, 20, 90, 100, 10, 40, 30, 10, 100, 20, 40, 60, 40, 100] },
            { text: `拿出保養品精準修復，冷靜規劃明天的體能數據`, v: [10, 100, 40, 20, 20, 100, 20, 30, 100, 10, 40, 100, 90, 70, 10] },
            { text: `對鏡子大吼，甚至想揮拳擊碎這具虛偽的皮囊`, v: [40, 50, 100, 40, 80, 70, 90, 90, 100, 60, 100, 80, 100, 100, 40] },
            { text: `看著倒影覺得很陌生，這只是一坨會呼吸的肉塊`, v: [30, 90, 30, 100, 40, 100, 100, 100, 70, 90, 100, 100, 100, 90, 70] }
        ]},
        { q: `8. 當一段關係走到終點，你認為最體面的告別是？`, o: [
            { text: `在那個人家門口守候一夜，直到心碎成粉末`, v: [100, 0, 10, 100, 100, 10, 40, 30, 0, 100, 10, 20, 40, 10, 100] },
            { text: `將共同財產和物品精確分配，一秒鐘都不多待`, v: [0, 100, 40, 20, 10, 100, 20, 40, 100, 10, 50, 100, 100, 70, 10] },
            { text: `當眾宣洩所有的恨，讓這段記憶徹底爆炸後凋零`, v: [60, 60, 100, 50, 80, 70, 90, 80, 100, 60, 90, 80, 90, 100, 50] },
            { text: `不需要告別，消失就是最好的語言`, v: [50, 90, 30, 100, 40, 90, 100, 100, 80, 90, 100, 100, 100, 90, 70] }
        ]},
        { q: `9. 你更願意把自己的靈魂寄託在？`, o: [
            { text: `一封永遠寄不出的手寫信，帶著濕漉漉的墨跡`, v: [100, 10, 20, 100, 100, 20, 50, 40, 10, 100, 20, 30, 50, 20, 100] },
            { text: `一段永不崩潰的加密代碼，在賽博世界永生`, v: [10, 100, 60, 30, 20, 100, 30, 40, 100, 20, 50, 100, 90, 70, 10] },
            { text: `一場即興的、滿是汗水與崩潰的現代舞`, v: [60, 60, 100, 60, 80, 90, 80, 90, 100, 70, 100, 80, 90, 100, 50] },
            { text: `一片無人的荒原，連風都沒有的沈默`, v: [50, 90, 30, 100, 40, 100, 100, 100, 80, 90, 100, 100, 100, 90, 70] }
        ]},
        { q: `10. 看到牆上的裂縫，你的第一反應是？`, o: [
            { text: `覺得它是房子在流淚，有一種殘缺的美感`, v: [100, 20, 30, 90, 100, 20, 60, 50, 20, 100, 40, 50, 60, 40, 100] },
            { text: `思考結構受力不均的原理，評估坍塌風險`, v: [10, 100, 40, 20, 10, 100, 20, 40, 100, 20, 50, 100, 90, 60, 20] },
            { text: `想用手指扣開它，看看裡面藏著什麼骯髒的秘密`, v: [60, 60, 100, 50, 80, 70, 80, 90, 100, 70, 90, 80, 100, 100, 50] },
            { text: `世界本來就是裂開的，這只是常態`, v: [70, 90, 40, 100, 50, 90, 100, 100, 80, 90, 100, 100, 100, 90, 70] }
        ]},
        { q: `11. 關於「痛苦」，你的哲學是？`, o: [
            { text: `它是通往深情的唯一門票，我不打算痊癒`, v: [100, 10, 20, 100, 100, 20, 50, 40, 10, 100, 20, 30, 50, 20, 100] },
            { text: `它是系統報錯，必須用理性和意志將其修復`, v: [10, 100, 50, 30, 20, 100, 30, 40, 100, 20, 50, 100, 90, 70, 10] },
            { text: `它是靈魂的興奮劑，能讓我創作出更狂暴的藝術`, v: [60, 60, 100, 60, 80, 90, 80, 90, 100, 70, 100, 80, 90, 100, 50] },
            { text: `它毫無意義，痛苦和快樂在時間長河裡都是零`, v: [50, 90, 30, 100, 40, 100, 100, 100, 80, 90, 100, 100, 100, 90, 70] }
        ]},
        { q: `12. 在一段關係中，如果對方開始變得平庸且無趣，你會？`, o: [
            { text: `感到劇烈的哀傷，試圖用自己的血與淚重新點燃對方`, v: [100, 10, 30, 80, 100, 20, 50, 40, 10, 100, 20, 30, 50, 20, 100] },
            { text: `冷靜評估這段關係的「半衰期」，尋找最合理的退出時機`, v: [0, 100, 50, 30, 20, 100, 20, 40, 90, 20, 40, 100, 90, 70, 10] },
            { text: `出軌、爭吵或離家出走，用極端行為對抗平庸的死亡`, v: [40, 60, 100, 50, 80, 70, 90, 80, 100, 60, 100, 80, 90, 100, 40] },
            { text: `沒關係，反正我也只是在扮演「伴侶」這個角色`, v: [50, 90, 20, 100, 40, 90, 100, 100, 70, 80, 100, 100, 100, 80, 50] }
        ]},
        { q: `13. 當你被大眾嚴重誤解、甚至遭遇網暴時，你會？`, o: [
            { text: `反覆寫下長文解釋，渴望哪怕只有一個人能聽見我的心跳`, v: [100, 0, 20, 90, 100, 10, 40, 30, 0, 100, 10, 30, 50, 20, 100] },
            { text: `收集證據起訴，用法律和邏輯把這群烏合之眾徹底擊碎`, v: [10, 100, 40, 20, 10, 100, 30, 40, 100, 10, 50, 100, 100, 60, 20] },
            { text: `開直播瘋狂嘲諷世界，把這場災難變成一場藝術表演`, v: [50, 50, 100, 50, 80, 80, 90, 80, 100, 70, 90, 80, 90, 100, 40] },
            { text: `直接註銷帳號人間蒸發，他們評論的是一個虛假的符號`, v: [60, 90, 30, 100, 40, 100, 100, 100, 80, 90, 100, 100, 100, 90, 70] }
        ]},
        { q: `14. 關於「背叛」，你最極端的看法是？`, o: [
            { text: `它比死亡更痛，我會帶著這道傷疤直到靈魂消亡`, v: [100, 10, 20, 100, 100, 20, 50, 40, 10, 100, 20, 30, 50, 20, 100] },
            { text: `這只是利益重新分配後的必然結果，沒必要投入情緒`, v: [10, 100, 50, 30, 20, 100, 30, 40, 100, 20, 50, 100, 90, 70, 10] },
            { text: `背叛是生命力爆發的標誌，我也隨時準備背叛平庸的自己`, v: [60, 60, 100, 60, 80, 90, 80, 90, 100, 70, 100, 80, 90, 100, 50] },
            { text: `連自己都無法信任的人，談什麼被別人背叛？`, v: [50, 90, 30, 100, 40, 100, 100, 100, 80, 90, 100, 100, 100, 90, 70] }
        ]},
        { q: `15. 如果可以讓一個人永遠記住你，你希望那是因為？`, o: [
            { text: `我曾給過他這世上最溫柔、最無可替代的愛`, v: [100, 20, 30, 90, 100, 20, 60, 50, 20, 100, 40, 50, 60, 40, 100] },
            { text: `我曾在他最絕望時，提供了最精準的生存建議與資源`, v: [10, 100, 40, 20, 10, 100, 20, 40, 100, 20, 50, 100, 90, 60, 20] },
            { text: `我曾像一顆炸彈一樣闖入他的生活，毀滅了他的所有認知`, v: [60, 60, 100, 50, 80, 70, 80, 90, 100, 70, 90, 80, 100, 100, 50] },
            { text: `我希望他完全忘了我，不留任何痕跡才是對彼此的慈悲`, v: [70, 90, 40, 100, 50, 90, 100, 100, 80, 90, 100, 100, 100, 90, 70] }
        ]},
        { q: `16. 在熱鬧的派對席間，你最想做的動作是？`, o: [
            { text: `盯著某個人的眼睛，試圖讀出他面具背後的哀傷`, v: [100, 20, 40, 80, 100, 30, 60, 50, 20, 100, 40, 50, 60, 40, 100] },
            { text: `躲在角落滑手機，處理未完成的項目，效率至上`, v: [10, 100, 30, 20, 10, 100, 20, 40, 100, 20, 50, 100, 90, 60, 20] },
            { text: `跳上桌子跳舞，讓所有人看著我，燃燒掉這該死的社交恐懼`, v: [60, 60, 100, 50, 80, 70, 80, 90, 100, 70, 90, 80, 100, 100, 50] },
            { text: `拿著酒杯看著落地窗外的夜空，思考人類為何要聚在一起`, v: [70, 90, 40, 100, 50, 90, 100, 100, 80, 90, 100, 100, 100, 90, 70] }
        ]},
        { q: `17. 關於「告白」，你認為最動人的方式是？`, o: [
            { text: `在雨中站到脫力，只為說一句「我好想你」`, v: [100, 0, 10, 100, 100, 10, 50, 30, 0, 100, 10, 20, 40, 10, 100] },
            { text: `拿出一份關於未來的十年規劃書，精準承諾每一步`, v: [0, 100, 40, 20, 10, 100, 20, 30, 100, 10, 40, 100, 100, 60, 10] },
            { text: `在對方的門口放一把火，大喊著「我們一起燒掉過去吧」`, v: [40, 40, 100, 40, 50, 60, 70, 80, 100, 50, 90, 70, 80, 100, 30] },

    function renderQuestion() {
        const qData = questions[currentStep];
        const qTextEl = document.getElementById('q-text');
        const box = document.getElementById('opt-box');
        
        qTextEl.style.opacity = '0';
        box.style.pointerEvents = 'none'; 

        setTimeout(() => {
            document.getElementById('step-tag').innerText = `INSIGHT ${currentStep + 1} / ${questions.length}`;
            document.getElementById('progress-fill').style.width = `${((currentStep + 1) / questions.length) * 100}%`;
            
            qTextEl.innerText = qData.q;
            qTextEl.style.opacity = '1';

            const fragment = document.createDocumentFragment();
            box.innerHTML = ''; 
            
            qData.o.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'opt';
                btn.innerText = opt.text;
                btn.onclick = handleSelect.bind(null, opt.v);
                fragment.appendChild(btn);
            });
            
            box.appendChild(fragment);
            box.style.pointerEvents = 'auto'; 
        }, 300);
    }
