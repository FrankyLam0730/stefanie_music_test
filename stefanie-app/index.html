<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遇見 - 孫燕姿專輯人格測試</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-base: #fcfaf8;
            --accent: #d35400;
            --text-main: #34495e;
            --text-sub: #a0a0a0;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* 开始页面样式 */
        #welcome-ui {
            text-align: center;
            animation: fadeIn 1s ease;
        }

        .welcome-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .welcome-sub {
            font-size: 1rem;
            color: var(--text-sub);
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        .btn-start-quiz {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(211, 84, 0, 0.2);
        }

        .btn-start-quiz:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(211, 84, 0, 0.3);
        }

        /* 测验页面样式 */
        #quiz-ui { display: none; }
        .progress-container { width: 40px; height: 2px; background: #eee; margin-bottom: 40px; overflow: hidden; border-radius: 2px; }
        #progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .step-info { font-size: 0.75rem; letter-spacing: 0.1em; color: var(--text-sub); margin-bottom: 8px; }
        .q-text { font-size: 1.4rem; font-weight: 300; line-height: 1.6; margin-bottom: 40px; min-height: 4.8rem; }
        .options-group { display: flex; flex-direction: column; gap: 12px; }
        .opt { border: none; background: var(--card-bg); padding: 20px; border-radius: 12px; text-align: left; font-size: 0.95rem; color: var(--text-main); cursor: pointer; transition: all 0.2s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .opt:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); color: var(--accent); }

        /* 结果页 */
        #result { display: none; text-align: center; animation: fadeIn 1s ease forwards; }
        .album-name { font-size: 2.2rem; font-weight: 700; margin-bottom: 30px; color: var(--accent); }
        .desc-text { font-size: 0.9rem; line-height: 1.8; color: #7f8c8d; margin: 30px 0; text-align: justify; }
        #radar-container { margin: 0 auto; max-width: 300px; }
        .btn-restart { margin-top: 40px; background: transparent; border: 1px solid #ddd; padding: 12px 30px; border-radius: 25px; color: var(--text-sub); cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-out { opacity: 0; }
    </style>
</head>
<body>

<div id="app">
    <div id="welcome-ui">
        <div class="welcome-title">遇見</div>
        <div class="welcome-sub">孫燕姿專輯人格感應</div>
        <button class="btn-start-quiz" onclick="startQuiz()">開始感應</button>
        <div style="font-size: 0.7rem; color: #bbb; margin-top: 30px; letter-spacing: 1px;">
            * 本測驗僅供娛樂，不上升個人品格評價（由FrankyLam製作）
        </div>
    </div>

    <div id="quiz-ui">
        <div class="progress-container"><div id="progress-fill"></div></div>
        <div class="step-info" id="step-tag"></div>
        <div class="q-text" id="q-text"></div>
        <div class="options-group" id="opt-box"></div>
    </div>

    <div id="result">
        <span style="font-size: 0.8rem; color: #a0a0a0; letter-spacing: 2px;">SOUL ALBUM MATCH</span>
        <div class="album-name" id="res-title"></div>
        
        <div id="radar-container" style="max-width: 350px;"><canvas id="radarChart"></canvas></div>
        
        <div class="desc-text" id="res-desc"></div>

        <div style="margin-top: 30px; text-align: left; padding: 0 10px;">
            <h3 style="font-size: 0.95rem; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 10px; margin-bottom: 12px;">潛意識剖析</h3>
            <p id="res-subconscious" style="font-size: 0.85rem; line-height: 1.6; color: #7f8c8d; margin-bottom: 25px;"></p>
            
            <h3 style="font-size: 0.95rem; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 10px; margin-bottom: 12px;">專輯深度解讀</h3>
            <p id="res-depth" style="font-size: 0.85rem; line-height: 1.6; color: #7f8c8d;"></p>
        </div>

        <div style="font-size: 0.7rem; color: #ccc; margin-top: 50px; padding: 20px; border-top: 1px dashed #eee; line-height: 1.5;">
            本測驗僅供娛樂與社交分享使用，結果基於特定算法模擬，不代表專業心理評估。內容均不上升至個人品格評價。（由FrankyLam製作）
        </div>

        <button class="btn-restart" onclick="location.reload()">RETAKE TEST</button>
    </div>
</div>


<script>
        const questions = [
        { q: `1. 清晨醒來發現窗外是大晴天，你內心最真實的衝動是？`, o: [
            { text: `想念某個人，立刻想傳訊息分享心情`, v: [10,2,4,10,8, 4,6,3,2,10, 3,4,6,2,9] }, // 感性/溫暖
            { text: `立刻規劃清單，不能浪費這完美的效率日`, v: [0,10,6,2,3, 10,2,3,9,3, 4,10,9,7,2] }, // 理性/掌控
            { text: `衝出家門在大街上奔跑，感受血液沸騰`, v: [3,6,10,2,7, 5,4,6,10,5, 9,7,8,10,4] }, // 狂熱/生命力
            { text: `關上窗簾繼續睡，外面的喧囂與我無關`, v: [7,8,2,7,2, 6,10,10,4,8, 10,8,10,6,5] } // 疏離/獨立
        ]},
        { q: `2. 在完全陌生的城市迷路且手機沒電，你會？`, o: [
            { text: `坐在路邊觀察行人，享受這份迷失的恐懼感`, v: [10,5,2,8,4, 6,10,9,5,10, 8,7,10,8,3] }, 
            { text: `冷靜尋找地標，用邏輯推算回家的路`, v: [0,10,5,2,2, 9,2,3,8,2, 4,10,9,5,2] },
            { text: `搭訕路人尋求熱烈的交流與幫助`, v: [5,4,10,5,9, 4,3,4,7,7, 6,5,7,9,9] },
            { text: `就地流浪，把這次迷路當成靈魂的逃亡`, v: [6,9,7,4,3, 7,9,10,8,6, 10,9,8,10,4] }
        ]},
        { q: `3. 面對一疊舊照片，你的第一反應是？`, o: [
            { text: `心碎或鼻酸，覺得那時的純粹再也回不來`, v: [10,2,2,10,8, 3,8,5,2,10, 2,3,5,2,10] },
            { text: `快速翻閱後丟掉，垃圾不需要佔用空間`, v: [0,10,7,2,2, 10,2,3,8,2, 5,10,9,6,2] },
            { text: `想把照片剪碎重組成一件藝術品`, v: [8,7,10,5,5, 6,9,8,9,9, 9,8,10,9,4] },
            { text: `平靜地看著照片裡的陌生人，毫無波動`, v: [4,9,4,7,4, 8,10,10,6,7, 10,9,9,7,6] }
        ]},
        { q: `4. 突然被告知有三個月的財富自由假期，你會？`, o: [
            { text: `回到家鄉，在奶奶的院子裡發呆曬太陽`, v: [9,2,4,9,10, 5,6,5,4,10, 5,6,7,5,10] },
            { text: `報名頂尖商業課程，瘋狂擴展人脈`, v: [2,10,8,2,4, 10,4,5,10,4, 7,10,8,10,4] },
            { text: `去極地探險，在冰天雪地裡大聲尖叫`, v: [6,8,10,4,6, 8,7,8,9,7, 10,9,9,10,5] },
            { text: `消失在社交平台，誰也找不到我的座標`, v: [5,10,5,8,4, 8,10,10,8,8, 10,10,10,8,6] }
        ]},
        { q: `5. 在深夜的巴士上，你更喜歡看窗外什麼？`, o: [
            { text: `萬家燈火，想像每一扇窗後的悲歡離合`, v: [10,4,5,10,9, 5,8,6,3,10, 4,5,7,5,10] },
            { text: `玻璃上自己的倒影，檢視現在的表情`, v: [3,10,6,5,4, 9,6,7,8,6, 6,10,9,7,5] },
            { text: `飛速後退的路燈，享受那種撕裂感的快感`, v: [5,9,10,3,7, 8,7,9,10,7, 9,8,8,10,4] },
            { text: `無盡的黑暗，感覺靈魂漂浮在宇宙`, v: [8,10,4,9,5, 7,10,10,7,9, 10,10,10,8,7] }
        ]},
        { q: `6. 如果生活欺騙了你，你會？`, o: [
            { text: `躲進被窩放聲大哭，像個受傷的孩子`, v: [10,3,4,9,10, 4,8,5,2,10, 2,3,5,2,10] },
            { text: `冷笑一聲，立刻制定報復或翻盤計劃`, v: [0,10,7,3,2, 10,4,5,10,4, 6,10,10,8,3] },
            { text: `像瘋子一樣去雨中狂舞，燒毀過去`, v: [7,8,10,5,5, 9,10,9,10,9, 10,9,10,10,4] },
            { text: `面無表情地收拾行李，立刻人間蒸發`, v: [5,10,5,8,5, 9,10,10,8,8, 10,10,10,8,6] }
        ]},
        { q: `7. 你對“永恆”的理解是？`, o: [
            { text: `那一刻的感動，刻在心裡的傷疤`, v: [10,4,6,10,9, 5,7,6,4,10, 5,7,8,6,10] },
            { text: `不斷自我進化的過程，沒有終點`, v: [2,10,9,4,6, 10,6,7,10,6, 8,10,10,9,6] },
            { text: `燃燒殆盡後留下的那抹灰燼`, v: [8,9,10,6,5, 8,10,9,9,8, 10,8,10,10,5] },
            { text: `宇宙邊緣的一顆孤星，寂靜無聲`, v: [7,10,6,9,4, 8,10,10,8,9, 10,10,10,9,7] }
        ]},
        { q: `8. 在一段關係中，你最受不了？`, o: [
            { text: `對方的冷漠，這比爭吵更傷人`, v: [10,3,5,9,10, 4,7,5,2,10, 3,4,6,4,10] },
            { text: `對方沒上進心，阻礙我的步伐`, v: [2,10,8,3,4, 10,4,4,10,4, 6,10,9,8,3] },
            { text: `平庸與乏味，日子像一潭死水`, v: [6,8,10,5,7, 7,6,8,9,7, 9,8,8,10,6] },
            { text: `被束縛，連呼吸都要看對方眼色`, v: [5,10,6,8,5, 9,10,10,8,8, 10,10,10,9,5] }
        ]},
        { q: `9. 你的夢境通常是？`, o: [
            { text: `充滿故人與遺憾的懷舊場景`, v: [10,3,3,10,9, 4,8,5,2,10, 2,4,6,2,10] },
            { text: `邏輯清晰的任務，甚至在夢裡解決問題`, v: [2,10,7,4,4, 10,5,6,9,5, 6,10,10,7,4] },
            { text: `色彩怪誕、充滿張力與衝突的電影`, v: [8,8,10,6,6, 8,10,9,10,9, 9,9,10,10,5] },
            { text: `荒蕪的沙漠或星空，只有自己一個人`, v: [7,10,5,8,5, 8,10,10,8,8, 10,10,10,8,7] }
        ]},
        { q: `10. 如果要給自己寫墓誌銘，你會寫？`, o: [
            { text: `我曾熱烈地愛過與被愛過`, v: [10,4,7,9,10, 5,7,6,5,10, 5,7,8,7,10] },
            { text: `我來過，我看過，我征服過`, v: [0,10,10,2,3, 10,5,6,10,4, 8,10,10,10,3] },
            { text: `不瘋魔，不成活`, v: [7,9,10,6,6, 9,10,9,10,9, 10,9,10,10,5] },
            { text: `此處空無一物`, v: [5,10,4,8,4, 10,10,10,8,8, 10,10,10,8,6] }
        ]},
                { q: `11. 關於“告別”，你的真實態度是？`, o: [
            { text: `流著淚回頭，試圖記住對方的每一個細節`, v: [10,3,4,10,8, 4,7,5,2,10, 3,5,7,4,9] }, 
            { text: `計算好最合理的離開時間，絕不拖泥帶水`, v: [2,10,6,3,2, 9,3,4,8,3, 5,10,8,7,3] }, 
            { text: `用一場宿醉或狂歡來埋葬這段關係`, v: [6,8,10,5,6, 8,9,8,10,7, 9,8,9,10,5] }, 
            { text: `揮揮手，心裡已經在計劃下一站的流浪`, v: [5,9,7,6,5, 7,10,10,8,6, 10,9,9,10,6] } 
        ]},
        { q: `12. 走在雨中，如果不急著趕路，你會？`, o: [
            { text: `躲在屋簷下，聽著雨聲寫一段憂傷的詩`, v: [9,4,3,10,8, 5,8,7,3,10, 4,6,8,4,10] },
            { text: `撐開一把精準防禦的黑傘，維持體面`, v: [2,10,5,3,4, 9,4,3,8,4, 6,10,10,6,5] },
            { text: `丟掉雨傘，在大雨中放肆跳舞叫囂`, v: [6,7,10,5,6, 8,10,9,10,8, 10,8,10,10,4] },
            { text: `面無表情地走在雨裡，感受被世界隔絕`, v: [5,9,5,7,5, 8,10,10,7,9, 9,10,10,8,7] }
        ]},
        { q: `13. 你的書桌/辦公桌通常是？`, o: [
            { text: `擺滿了充滿回憶的小物件與相片`, v: [10,3,6,9,10, 4,5,5,3,9, 4,5,7,4,10] },
            { text: `極簡主義，除了筆記本沒有任何雜物`, v: [0,10,5,4,2, 10,4,3,8,3, 6,10,10,6,4] },
            { text: `堆滿了色彩斑斕的工具，混亂而有張力`, v: [6,7,10,6,8, 7,8,9,8,8, 9,7,9,10,7] },
            { text: `一個空蕩蕩的平面，隨時準備搬走`, v: [5,9,4,7,4, 8,10,10,8,7, 10,10,10,9,5] }
        ]},
        { q: `14. 面對別人的誤解，你的行為是？`, o: [
            { text: `反覆解釋到哽咽，希望對方能懂我的心`, v: [10,4,5,8,8, 5,7,5,4,10, 3,5,7,5,9] },
            { text: `羅列證據，用邏輯與事實讓對方閉嘴`, v: [2,10,7,3,2, 9,4,4,10,4, 7,10,10,8,3] },
            { text: `大笑三聲，覺得這個誤解本身很精彩`, v: [5,8,10,6,7, 8,10,9,9,7, 9,8,9,10,6] },
            { text: `直接封鎖刪除，我的宇宙不需要雜音`, v: [4,10,5,9,3, 10,10,10,8,8, 10,10,10,7,4] }
        ]},
        { q: `15. 如果可以擁有一項超能力，你選？`, o: [
            { text: `回到過去，修改那一場遺憾的遇見`, v: [10,2,3,10,7, 4,8,6,2,10, 2,4,6,3,10] },
            { text: `暫停時間，精準掌控每一秒的得失`, v: [3,10,7,4,4, 10,5,6,10,5, 7,10,9,8,4] },

        { q: `16. 看到路邊有流浪藝人在表演，你會？`, o: [
            { text: `被旋律觸動，站在原地聽完並落淚`, v: [10,4,7,9,9, 6,7,6,4,10, 4,6,8,6,10] },

        { q: `18. 你最受不了哪種類型的社交？`, o: [

        { q: `20. 如果可以開一家店，你會開？`, o: [

    function showResult() {

        document.getElementById('result').style.display = 'block';

        let minDistance = Infinity;
        let winner = albums[0];
